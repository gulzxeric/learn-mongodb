<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog CMS Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f1f5f9; color: #1e293b; display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar { width: 220px; background: #1e293b; color: #fff; padding: 24px 0; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; }
.sidebar h1 { font-size: 18px; padding: 0 20px 20px; border-bottom: 1px solid #334155; margin-bottom: 8px; }
.sidebar .subtitle { font-size: 12px; color: #94a3b8; padding: 0 20px 20px; border-bottom: 1px solid #334155; margin-bottom: 8px; }
.sidebar nav a { display: block; padding: 10px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; transition: .15s; }
.sidebar nav a:hover, .sidebar nav a.active { background: #334155; color: #fff; }
.sidebar nav a .icon { margin-right: 8px; }

/* Main */
.main { margin-left: 220px; flex: 1; padding: 24px 32px; max-width: calc(100vw - 220px); }
.page { display: none; }
.page.active { display: block; }
.page h2 { font-size: 22px; margin-bottom: 20px; }

/* Stats cards */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-card .label { font-size: 13px; color: #64748b; margin-bottom: 4px; }
.stat-card .value { font-size: 28px; font-weight: 700; }

/* Charts area */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-box { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.chart-box h3 { font-size: 14px; color: #64748b; margin-bottom: 12px; }
.chart-box ul { list-style: none; }
.chart-box li { display: flex; align-items: center; padding: 6px 0; font-size: 14px; }
.chart-box li .bar-wrap { flex: 1; margin-left: 12px; }
.chart-box li .bar { height: 6px; border-radius: 3px; background: #3b82f6; min-width: 4px; transition: width .5s; }
.chart-box li .count { color: #64748b; font-size: 12px; width: 30px; text-align: right; }

/* Table */
.table-wrap { background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 10px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
th { background: #f8fafc; font-weight: 600; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
tr:hover td { background: #f8fafc; }

/* Pagination */
.pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
.pagination button { padding: 6px 14px; border: 1px solid #e2e8f0; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; }
.pagination button:hover { background: #f1f5f9; }
.pagination button:disabled { opacity: .4; cursor: not-allowed; }
.pagination span { font-size: 13px; color: #64748b; }

/* Form */
.form-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.form-row input, .form-row select { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
.form-row input:focus { outline: none; border-color: #3b82f6; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: .15s; white-space: nowrap; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; opacity: 0; transition: opacity .3s; z-index: 1000; }
.toast.show { opacity: 1; }
.toast.success { background: #22c55e; }
.toast.error { background: #ef4444; }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filters input, .filters select { padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; }

/* Action buttons in table */
.action-cell { display: flex; gap: 4px; }

/* Inline form for CRUD */
.crud-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="sidebar">
  <h1>Blog CMS</h1>
  <div class="subtitle">Dashboard</div>
  <nav>
    <a href="#dashboard" class="active" onclick="navigate('dashboard')"><span class="icon">&#9632;</span>Dashboard</a>
    <a href="#posts" onclick="navigate('posts')"><span class="icon">&#9998;</span>Posts</a>
    <a href="#tags" onclick="navigate('tags')"><span class="icon">&#35;</span>Tags</a>
    <a href="#categories" onclick="navigate('categories')"><span class="icon">&#9776;</span>Categories</a>
  </nav>
</div>

<div class="main" id="app">

  <!-- Dashboard -->
  <div class="page active" id="page-dashboard">
    <h2>Dashboard</h2>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="charts-grid">
      <div class="chart-box">
        <h3>Tag Cloud</h3>
        <ul id="tagCloud"></ul>
      </div>
      <div class="chart-box">
        <h3>Author Ranking</h3>
        <ul id="authorRanking"></ul>
      </div>
    </div>
  </div>

  <!-- Posts -->
  <div class="page" id="page-posts">
    <h2>Posts</h2>
    <div class="filters">
      <input type="text" id="postSearch" placeholder="Search..." oninput="loadPosts(1)">
      <select id="postFilterPublished" onchange="loadPosts(1)">
        <option value="">All</option>
        <option value="true">Published</option>
        <option value="false">Draft</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Title</th><th>Author</th><th>Category</th><th>Comments</th><th>Status</th><th>Date</th></tr></thead>
        <tbody id="postsBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="postsPagination"></div>
  </div>

  <!-- Tags -->
  <div class="page" id="page-tags">
    <h2>Tags</h2>
    <div class="crud-header">
      <div class="form-row">
        <input type="text" id="tagInput" placeholder="New tag name">
        <button class="btn btn-primary" onclick="createTag()">Add</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Actions</th></tr></thead>
        <tbody id="tagsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Categories -->
  <div class="page" id="page-categories">
    <h2>Categories</h2>
    <div class="crud-header">
      <div class="form-row">
        <input type="text" id="catNameInput" placeholder="Name">
        <input type="text" id="catSlugInput" placeholder="Slug">
        <button class="btn btn-primary" onclick="createCategory()">Add</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Name</th><th>Slug</th><th>Actions</th></tr></thead>
        <tbody id="categoriesBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ========= Config =========
const API_BASE = "http://localhost:3000"; // Express | "http://localhost:8000" (FastAPI) | "" (same origin)

// ========= Navigation =========
function navigate(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".sidebar nav a").forEach(a => a.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
  document.querySelector(`.sidebar nav a[href="#${page}"]`).classList.add("active");
  if (page === "dashboard") loadDashboard();
  if (page === "posts") loadPosts(1);
  if (page === "tags") loadTags();
  if (page === "categories") loadCategories();
}

// ========= Toast =========
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + type + " show";
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ========= API helper =========
async function api(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    headers: { "Content-Type": "application/json", ...options.headers },
    ...options,
  });
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || "Request failed");
  return data;
}

// ========= Dashboard =========
async function loadDashboard() {
  try {
    const [stats, tagCloud, authorRanking] = await Promise.all([
      api("/stats/dashboard"),
      api("/stats/tag-cloud"),
      api("/stats/author-ranking"),
    ]);

    document.getElementById("statsGrid").innerHTML = Object.entries(stats)
      .map(([k, v]) => `<div class="stat-card"><div class="label">${k.replace(/_/g, " ")}</div><div class="value">${v}</div></div>`)
      .join("");

    const maxTag = Math.max(...tagCloud.map(t => t.count));
    document.getElementById("tagCloud").innerHTML = tagCloud
      .map(t => `<li><span>${t.name}</span><div class="bar-wrap"><div class="bar" style="width:${(t.count/maxTag)*100}%"></div></div><span class="count">${t.count}</span></li>`)
      .join("");

    const maxAuthor = Math.max(...authorRanking.map(a => a.post_count));
    document.getElementById("authorRanking").innerHTML = authorRanking
      .map(a => `<li><span>${a.username}</span><div class="bar-wrap"><div class="bar" style="width:${(a.post_count/maxAuthor)*100}%"></div></div><span class="count">${a.post_count}</span></li>`)
      .join("");
  } catch (e) { showToast(e.message, "error"); }
}

// ========= Posts =========
let postsCurrentPage = 1;

async function loadPosts(page) {
  postsCurrentPage = page;
  try {
    const search = document.getElementById("postSearch").value;
    const published = document.getElementById("postFilterPublished").value;
    let query = `?page=${page}&page_size=5`;
    if (search) query += `&search=${encodeURIComponent(search)}`;
    if (published) query += `&published=${published}`;

    // Fetch posts + lookup data
    const data = await api("/posts" + query);

    // Fetch author and category names
    const userIds = [...new Set(data.items.map(p => p.authorId))];
    const catIds = [...new Set(data.items.map(p => p.categoryId))];
    const [users, cats] = await Promise.all([
      Promise.all(userIds.map(id => api("/users/" + id).catch(() => ({ username: "?" })))),
      Promise.all(catIds.map(id => api("/categories/" + id).catch(() => ({ name: "?" })))),
    ]);
    const userMap = {}; userIds.forEach((id, i) => { userMap[id] = users[i].username; });
    const catMap = {}; catIds.forEach((id, i) => { catMap[id] = cats[i].name; });

    document.getElementById("postsBody").innerHTML = data.items.map(p => `
      <tr>
        <td><strong>${p.title}</strong></td>
        <td>${userMap[p.authorId] || "?"}</td>
        <td>${catMap[p.categoryId] || "?"}</td>
        <td>${p.commentCount}</td>
        <td>${p.published ? '<span style="color:#22c55e">Published</span>' : '<span style="color:#f59e0b">Draft</span>'}</td>
        <td>${new Date(p.createdAt).toLocaleDateString()}</td>
      </tr>
    `).join("");

    const totalPages = Math.ceil(data.total / data.page_size);
    document.getElementById("postsPagination").innerHTML = `
      <button onclick="loadPosts(${postsCurrentPage - 1})" ${postsCurrentPage <= 1 ? "disabled" : ""}>Prev</button>
      <span>Page ${data.page} of ${totalPages || 1}</span>
      <button onclick="loadPosts(${postsCurrentPage + 1})" ${postsCurrentPage >= totalPages ? "disabled" : ""}>Next</button>
    `;
  } catch (e) { showToast(e.message, "error"); }
}

// ========= Tags CRUD =========
async function loadTags() {
  try {
    const tags = await api("/tags");
    document.getElementById("tagsBody").innerHTML = tags.map(t => `
      <tr>
        <td>${t.name}</td>
        <td class="action-cell">
          <button class="btn btn-danger btn-sm" onclick="deleteTag('${t.id}')">Delete</button>
        </td>
      </tr>
    `).join("");
  } catch (e) { showToast(e.message, "error"); }
}

async function createTag() {
  const input = document.getElementById("tagInput");
  const name = input.value.trim();
  if (!name) return showToast("Name is required", "error");
  try {
    await api("/tags", { method: "POST", body: JSON.stringify({ name }) });
    input.value = "";
    showToast("Tag created");
    loadTags();
  } catch (e) { showToast(e.message, "error"); }
}

async function deleteTag(id) {
  if (!confirm("Delete this tag?")) return;
  try {
    await api("/tags/" + id, { method: "DELETE" });
    showToast("Tag deleted");
    loadTags();
  } catch (e) { showToast(e.message, "error"); }
}

// ========= Categories CRUD =========
async function loadCategories() {
  try {
    const cats = await api("/categories");
    document.getElementById("categoriesBody").innerHTML = cats.map(c => `
      <tr>
        <td>${c.name}</td>
        <td>${c.slug}</td>
        <td class="action-cell">
          <button class="btn btn-danger btn-sm" onclick="deleteCategory('${c.id}')">Delete</button>
        </td>
      </tr>
    `).join("");
  } catch (e) { showToast(e.message, "error"); }
}

async function createCategory() {
  const name = document.getElementById("catNameInput").value.trim();
  const slug = document.getElementById("catSlugInput").value.trim();
  if (!name || !slug) return showToast("Name and slug required", "error");
  try {
    await api("/categories", { method: "POST", body: JSON.stringify({ name, slug }) });
    document.getElementById("catNameInput").value = "";
    document.getElementById("catSlugInput").value = "";
    showToast("Category created");
    loadCategories();
  } catch (e) { showToast(e.message, "error"); }
}

async function deleteCategory(id) {
  if (!confirm("Delete this category?")) return;
  try {
    await api("/categories/" + id, { method: "DELETE" });
    showToast("Category deleted");
    loadCategories();
  } catch (e) { showToast(e.message, "error"); }
}

// ========= Init =========
window.addEventListener("hashchange", () => {
  const page = location.hash.slice(1) || "dashboard";
  navigate(page);
});

loadDashboard();
</script>
</body>
</html>
